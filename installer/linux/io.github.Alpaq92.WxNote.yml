# Flatpak manifest for wxNote. Unlike a typical Flatpak module, this does NOT compile from
# source inside the build sandbox - it stages the already-built wxnote binary (from
# `cmake --build build --target wxnote`, run before installer/linux/build-flatpak.sh) via
# `buildsystem: simple`, matching the same "package what's already built" approach as
# build-appimage.sh/build-deb.sh/build-rpm.sh, all of which exist because this project has no
# Linux machine to verify a from-scratch-in-sandbox build against, only CI.
#
# Resources stay co-located with the binary under /app/bin (same reasoning as the other three
# Linux/macOS packages): the app resolves every resource path relative to its own executable, so
# this layout needs zero runtime code changes, even though /app/bin isn't the conventional
# Flatpak location for non-executable data (that would be /app/share) - nothing requires that
# convention, it's just a convention, and violating it costs nothing here since nothing else reads
# /app/bin looking only for executables.

app-id: io.github.Alpaq92.WxNote
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: wxnote

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=fallback-x11
  - --filesystem=host    # a text editor needs to open/save arbitrary user files
  - --device=dri

modules:
  - name: wxnote
    buildsystem: simple
    build-commands:
      - install -Dm755 build-bin/wxnote /app/bin/wxnote
      - cp -r build-bin/icons /app/bin/icons
      - cp -r build-bin/icons-solar /app/bin/icons-solar
      - cp -r build-bin/icons-iconpark /app/bin/icons-iconpark
      - cp -r build-bin/icons-streamline /app/bin/icons-streamline
      - cp -r build-bin/themes /app/bin/themes
      - mkdir -p /app/bin/locale
      - cp -r build-bin/locale/. /app/bin/locale/
      - find /app/bin/locale -name '*.po' -delete
      - find /app/bin/locale -name '*.pot' -delete
      - find /app/bin/locale -name 'po2mo.py' -delete
      - find /app/bin/locale -depth -type d -name '__pycache__' -exec rm -rf {} +
      - install -Dm644 build-bin/stylers.model.xml /app/bin/stylers.model.xml
      - install -Dm644 wxnote.desktop /app/share/applications/io.github.Alpaq92.WxNote.desktop
      - install -Dm644 wxnote.png /app/share/icons/hicolor/256x256/apps/io.github.Alpaq92.WxNote.png
      - install -Dm644 wxnote.metainfo.xml /app/share/metainfo/io.github.Alpaq92.WxNote.metainfo.xml
    sources:
      - type: dir
        path: ../../build/bin
        dest: build-bin
      - type: file
        path: io.github.Alpaq92.WxNote.desktop
        dest-filename: wxnote.desktop
      - type: file
        # Rasterized by build-flatpak.sh from resources/wxnote.svg immediately before this
        # runs - appstreamcli compose (invoked by flatpak-builder's cleanup phase) needs to decode
        # the installed icon, and the Ubuntu-packaged appstreamcli commonly lacks librsvg support,
        # so an SVG source here fails with an opaque file-read-error. PNG has no such dependency.
        path: ../../build/flatpak-icon-256.png
        dest-filename: wxnote.png
      - type: file
        path: io.github.Alpaq92.WxNote.metainfo.xml
        dest-filename: wxnote.metainfo.xml
