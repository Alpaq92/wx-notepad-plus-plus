name: Feature request
description: Suggest an idea for wxNote
title: "[Feature request] <title>"
#labels: ["feature"]
#type: feature
body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: Please search to see if an issue already exists for the feature you request.
    options:
    - label: I have searched the existing issues
      required: true
- type: textarea
  attributes:
    label: Description of the Issue
    description: A clear and concise description of what the problem is.
  validations:
    required: true
- type: textarea
  attributes:
    label: Describe the solution you'd like.
    description: A clear and concise description of what you want to happen.
  validations:
    required: true
- type: textarea
  attributes:
    label: Debug Information
    description: |
      In wxNote, click on the "Help" menu, then choose "Debug Info...".
      It shows your wxWidgets version, OS description, and executable path - there's no
      copy-to-clipboard button for it, so just note down (or screenshot) what it says and include
      it here, along with the wxNote version you're using.
    render: shell
  validations:
    required: false
- type: textarea
  attributes:
    label: Anything else?
    description: |
      Links? References? Anything that will give us more context about the feature you want!

      wxNote reuses the Lexilla and Scintilla libraries, same as Notepad++.
      For more details, visit https://github.com/ScintillaOrg/lexilla and https://sourceforge.net/p/scintilla.
      If you have a specific language/highlighting feature request, consider using the reference
      program SciTE to check whether it's already supported at the Scintilla/Lexilla level.
      You can download SciTE from here https://www.scintilla.org/SciTEDownload.html.

      If you have questions about using wxNote, check the documentation at
      https://github.com/Alpaq92/wx-notepad-plus-plus/tree/master/docs.

      Tip: You can attach images by clicking this area to highlight it and then dragging files in.
  validations:
    required: false
