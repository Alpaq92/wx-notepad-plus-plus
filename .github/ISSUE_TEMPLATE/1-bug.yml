name: Bug
description: File a bug/issue
title: "[BUG] <title>"
#labels: ["bug"]
#type: bug
body:
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: |
      Please search to see if an issue already exists for the bug you encountered.
      If the bug is in a third-party Notepad++-ABI plugin's own logic (loaded on Windows through
      the optional npp-bridge), rather than in wxNote itself, npp-bridge, or a bundled Nib plugin,
      please report it to that plugin's author instead.
    options:
    - label: I have searched the existing issues
      required: true
- type: input
  attributes:
    label: wxNote Version & Platform
    description: |
      The wxNote version you're using (check the filename of the installer/package you downloaded,
      e.g. wxNote-<version>-Setup.exe, or Help > Debug Info in the app) and your OS.
    placeholder: "e.g. wxNote 0.7.0, Windows 11 / Ubuntu 24.04 / macOS 14 Sonoma (Apple Silicon)"
  validations:
    required: true
- type: checkboxes
  attributes:
    label: Is the issue reproducible in wxNote without plugins?
    description: |
      If feasible, try launching wxNote without any plugins loaded.
      wxNote doesn't have a `-noPlugin` command-line switch, so instead rename or move the plugin
      folder(s) next to the executable: `nib/` (Nib plugins, all platforms) and, on Windows only,
      `plugins/` (Notepad++-ABI plugins loaded via npp-bridge) - e.g. to `nib.bak/` and `plugins.bak/`.
    options:
    - label: I have tried wxNote without plugins
      required: false
- type: checkboxes
  attributes:
    label: Does the issue affect SciTE?
    description: |
      wxNote reuses the Lexilla and Scintilla libraries, same as Notepad++.
      For more details, visit https://github.com/ScintillaOrg/lexilla and https://sourceforge.net/p/scintilla.
      Consider using the reference program SciTE to verify whether the issue is a genuine bug in
      wxNote or an upstream Scintilla/Lexilla issue.
      Download SciTE from here https://www.scintilla.org/SciTEDownload.html.
    options:
    - label: I have tried SciTE
      required: false
- type: textarea
  attributes:
    label: Description of the Issue
    description: Provide a concise description to the issue itself.
  validations:
    required: true
- type: textarea
  attributes:
    label: Steps To Reproduce
    description: Steps to reproduce the behavior.
    placeholder: |
      1.
      2.
      3.
      ...
    value: |
      1.
      2.
      3.
  validations:
    required: true
- type: textarea
  attributes:
    label: Current Behavior
    description: What you're experiencing.
  validations:
    required: true
- type: textarea
  attributes:
    label: Expected Behavior
    description: What did you expect to happen.
  validations:
    required: true
- type: textarea
  attributes:
    label: Debug Information
    description: |
      If wxNote is able to launch, open the "Help" menu and choose "Debug Info...". It shows your
      wxWidgets version, OS description, and executable path - there's no copy-to-clipboard button
      for it, so just note down (or screenshot) what it says and include it here.
    render: shell
  validations:
    required: false
- type: textarea
  attributes:
    label: Anything else?
    description: |
      Links? References? Anything that will give us more context about the issue you are encountering!

      Tip: You can attach images or relevant text files by clicking this area to highlight it and then dragging files in.
  validations:
    required: false
