name: spike-linux

# Validates the cross-platform compile of the wxWidgets editor spike (the part the Windows dev
# machine cannot check: that everything outside #ifdef __WXMSW__ actually builds on Linux/GTK).
# The spike is configured STANDALONE here (cmake -S spike) because the top-level Notepad++ CMake is
# Windows-locked (FATAL_ERROR on non-Windows). wxWidgets is built from source via FetchContent.

on:
  push:
    branches: [ wx-migration ]
    paths:
      - 'spike/**'
      - 'lexilla/**'
      - 'scintilla/include/**'
      - 'PowerEditor/src/**'
      - '.github/workflows/spike-linux.yml'
  pull_request:
    paths:
      - 'spike/**'
      - '.github/workflows/spike-linux.yml'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (GTK3 + toolchain)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config libgtk-3-dev

      # Cache the fetched + built wxWidgets so iterations don't rebuild it from source each run.
      - name: Cache wxWidgets (_deps)
        uses: actions/cache@v4
        with:
          path: build-spike/_deps
          key: wx331-${{ runner.os }}-${{ hashFiles('spike/CMakeLists.txt') }}
          restore-keys: |
            wx331-${{ runner.os }}-

      - name: Configure (standalone)
        run: cmake -S spike -B build-spike -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build npp_wx_spike
        run: cmake --build build-spike --target npp_wx_spike
