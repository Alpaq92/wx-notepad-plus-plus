name: build

# Builds wxNote on all three target platforms (x64 + ARM64 for Windows/Linux, arm64 + x86_64
# for macOS). wxWidgets is fetched + built from source
# (FetchContent), so the only system dependency is GTK3 on Linux; macOS/Windows need just the
# toolchain. Verifies the cross-platform claim - the parts the Windows dev machine can't check.

# Note: each job builds wxWidgets from source (cached after the first green run), so the matrix is heavy.
# The repo is public, so GitHub-hosted runners are free; macOS just queues longer than linux/windows.
on:
  push:
    branches: [ master ]
    paths: [ 'src/**', 'include/**', 'packages/**', 'cmake/**', 'third_party/**', 'resources/**', 'installer/**', 'CMakeLists.txt', '.github/workflows/build.yml' ]
  # Deliberately NOT path-filtered (unlike push above): master's branch ruleset requires its
  # checks (windows/linux/macos-arm64/macos-x86_64) on every PR unconditionally, so a doc-only PR (e.g. CHANGELOG.md) that skipped
  # the build here would sit forever as "Expected - waiting for status to be reported" and could
  # never merge normally.
  pull_request:
  workflow_dispatch:
  workflow_call:   # release.yml calls this on a version tag push, then publishes the 6 packaging artifacts

# A newer push to a branch cancels that branch's still-queued/running build, so the matrix doesn't
# pile up (each macOS run counts 10x against private-repo Actions minutes). Only the latest commit
# on a branch is verified, which is what we want.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux }
          # Two separate single-arch macOS builds rather than one universal (fat) binary, so each
          # download is smaller and users don't need to think about it beyond picking their chip.
          # Both build on the same (Apple Silicon) runner image - macos-latest has no native x86_64
          # option anymore, so the x86_64 leg cross-compiles via CMAKE_OSX_ARCHITECTURES below. That
          # runner ships Rosetta 2 preinstalled, which transparently covers any x86_64 try-run checks
          # CMake's configure step needs to execute during the wxWidgets FetchContent build.
          - { os: macos-latest,   name: macos-arm64,  osx_arch: arm64 }
          - { os: macos-latest,   name: macos-x86_64, osx_arch: x86_64 }
          - { os: windows-latest, name: windows }
          # ARM legs: GitHub's arm64 runners (free for public repos). Same steps as their x64
          # siblings - every packaging script detects the build host's arch itself; only the
          # Windows leg needs explicit knobs (native-ARM64 MSVC env + an installer name/guard
          # define, since NSIS can't detect the arch of the exe it's wrapping).
          - { os: ubuntu-24.04-arm, name: linux-arm64 }
          - { os: windows-11-arm,   name: windows-arm64, msvc_arch: arm64, nsis_flags: /DTARGET_ARM64 }
          # No native RISC-V runner exists, so linux-riscv64 CROSS-compiles on the x86_64 ubuntu host
          # (a from-source wxWidgets build under QEMU-native would blow the 6h job limit). `cross` gates
          # every step: the native-linux steps above are `&& !matrix.cross`, the riscv steps `== 'riscv64'`.
          - { os: ubuntu-latest,    name: linux-riscv64, cross: riscv64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      # Cross-compile setup for the riscv64 leg: constrain the stock (deb822) apt sources to amd64 so
      # `apt-get update` doesn't 404 hunting riscv64 indexes on archive/azure, add a riscv64-scoped
      # ports.ubuntu.com source, then install the cross toolchain + qemu (for wxWidgets' try_run checks)
      # + the riscv64 GTK3 dev sysroot (apt pulls the glib/pango/cairo/gdk-pixbuf/atk dep chain).
      - name: Set up riscv64 cross toolchain + GTK sysroot (Linux cross)
        if: matrix.cross == 'riscv64'
        run: |
          set -eux
          # Constrain EVERY existing deb822 source to the host arch first, so that after
          # `dpkg --add-architecture riscv64` `apt-get update` doesn't 404 hunting riscv64 indexes on
          # archives that don't carry it (the stock ubuntu.sources and any runner-added sources).
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -e "$f" ] || continue
            grep -q '^Architectures:' "$f" || sudo sed -i '/^Types:/a Architectures: amd64 i386' "$f"
          done
          CODENAME="$(. /etc/os-release; echo "$VERSION_CODENAME")"
          sudo tee /etc/apt/sources.list.d/riscv64-ports.sources >/dev/null <<EOF
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: ${CODENAME} ${CODENAME}-updates ${CODENAME}-security
          Components: main restricted universe multiverse
          Architectures: riscv64
          EOF
          sudo dpkg --add-architecture riscv64
          # ports.ubuntu.com occasionally serves a momentarily-inconsistent index mid-publish: a partial
          # krb5/cups set makes libgtk-3-dev:riscv64's dep chain briefly "not installable" (seen as
          # "libcups2t64:riscv64 Depends libgssapi-krb5-2:riscv64 (>= 1.17) but it is not installable").
          # It self-heals within minutes, and snapshot.ubuntu.com carries no -ports tree to pin against, so
          # refresh the index and retry instead of failing the whole release on a transient upstream skew.
          # A healthy index installs on the first pass (no sleeps); only a real skew pays the backoff.
          install_riscv_sysroot() {
            sudo apt-get update && sudo apt-get install -y --no-install-recommends \
              build-essential cmake ninja-build pkg-config \
              g++-riscv64-linux-gnu qemu-user-static binfmt-support \
              libgtk-3-dev:riscv64
          }
          n=1
          until install_riscv_sysroot; do
            if [ "$n" -ge 8 ]; then
              echo "::error::riscv64 GTK sysroot still not installable after $n tries - ports archive skew persisted; re-run this leg once ports.ubuntu.com re-syncs." >&2
              exit 1
            fi
            echo "riscv64 sysroot apt install failed (try $n/8); ports index may be mid-publish, retrying in 90s..." >&2
            n=$((n+1)); sleep 90
          done
          sudo update-binfmts --enable qemu-riscv64 || true
          qemu-riscv64-static --version

      - name: Install GTK3 (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build pkg-config libgtk-3-dev

      # rpm: provides rpmbuild for build-rpm.sh. flatpak/flatpak-builder: for build-flatpak.sh.
      # elfutils: provides eu-strip, which flatpak-builder always shells out to for its automatic
      # debuginfo-extraction step (no manifest option was found to skip this step on this
      # flatpak-builder version - it doesn't recognize no-debuginfo at either the manifest or
      # module level), even though we stage an already-built Release binary with nothing to split.
      # librsvg2-bin: provides rsvg-convert, used to pre-rasterize our SVG icon to PNG for the
      # flatpak package - see build-flatpak.sh for why appstreamcli compose needs that.
      - name: Install packaging tools (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: |
          sudo apt-get install -y --no-install-recommends rpm flatpak flatpak-builder elfutils librsvg2-bin
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      # Ubuntu 24.04+ restricts unprivileged user namespaces by default (AppArmor), which breaks
      # flatpak-builder's bubblewrap sandbox with an otherwise-cryptic setup failure. This is the
      # standard CI workaround; harmless no-op on runner images where the sysctl key doesn't exist
      # or the restriction isn't in effect.
      - name: Allow unprivileged user namespaces for flatpak-builder (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      # The GNOME runtime + SDK are a multi-hundred-MB download - cache them so only the first run
      # (or a version bump) pays that cost. Keyed on the pinned version in the Flatpak manifest.
      - name: Cache Flatpak runtime (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        uses: actions/cache@v6
        with:
          path: ~/.local/share/flatpak
          key: flatpak-gnome46-v1-${{ matrix.name }}

      - name: Install Flatpak runtime (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: flatpak install -y --user flathub org.gnome.Platform//46 org.gnome.Sdk//46

      # Cache the fetched + built wxWidgets so iterations don't rebuild it from source each run.
      # "v2" (was unversioned): the cached build/_deps holds a CMakeCache.txt stamped with whichever
      # generator configured it - bumping the key forces a clean rebuild under the now-forced Ninja
      # generator below instead of erroring with "generator does not match the one used previously".
      - name: Cache wxWidgets
        uses: actions/cache@v6
        with:
          path: build/_deps
          # The matrix name sits BEFORE the version token: restore-keys are prefix matches,
          # and "wx331-v2-linux-" would also match the linux-arm64 leg's cache - restoring
          # ARM-compiled wxWidgets onto an x64 host and poisoning the cache. "wx331-linux-v2-"
          # cannot prefix-match "wx331-linux-arm64-v2-", so each leg only ever sees its own.
          # Hash the cross toolchain file too, so a riscv64 toolchain edit invalidates that leg's wx cache
          # (it's a real build input unique to the cross leg; harmless on the other legs, where it's stable).
          key: wx331-${{ matrix.name }}-v2-${{ hashFiles('CMakeLists.txt', 'cmake/toolchains/*.cmake') }}
          restore-keys: wx331-${{ matrix.name }}-v2-

      # msvc-dev-cmd: puts cl.exe (not the runner's incidental MinGW g++) first on PATH, which
      # plain Ninja needs since - unlike the Visual Studio generator - it has no built-in MSVC
      # discovery of its own.
      - name: Set up MSVC (Windows)
        if: startsWith(matrix.name, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch || 'x64' }}

      # -G Ninja: without it, Windows' default generator is the multi-config "Visual Studio" one,
      # which ignores RUNTIME_OUTPUT_DIRECTORY's plain (non-per-config) setting and puts the exe in
      # build/bin/Release/ instead of build/bin/ - breaking every packaging script below that reads
      # from build/bin/wxnote.exe directly. Ninja is single-config and preinstalled on all 3 hosted
      # runner images; this also matches the build command documented at the top of CMakeLists.txt.
      # CMAKE_OSX_DEPLOYMENT_TARGET: without it, the macOS build inherits the hosted runner's SDK
      # version (whatever "macos-latest" happens to be), baking that into the binary's minimum-OS
      # requirement - so a .dmg built today could refuse to launch on anything older than this
      # month's macOS release. 11.0 (Big Sur) matches installer/macos/build-dmg.sh's own
      # LSMinimumSystemVersion and is well within what wxWidgets 3.3.1 supports. Harmless no-op on
      # the Linux/Windows legs of this matrix - CMake ignores Apple-only cache variables elsewhere.
      # CMAKE_OSX_ARCHITECTURES: only set (via matrix.osx_arch) on the two macOS legs, pinning each
      # build to a single target arch instead of wxWidgets/CMake's own default of "whatever the
      # runner's chip is" - that default would silently make both macOS legs produce an identical
      # arm64 binary since they share the same (Apple Silicon) runner image.
      # The riscv64 leg points pkg-config at the riscv64 .pc files via the toolchain file's
      # set(ENV{PKG_CONFIG_LIBDIR} ...) - NOT a step-level env, because a step env defaulting to '' on
      # the native legs would EMPTY pkg-config's search path and break wxWidgets' pkg-config-only GTK3
      # detection there. The toolchain-file env applies to the FetchContent sub-configures too (same
      # cmake process), so the cross leg is covered without touching the native legs.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 ${{ matrix.osx_arch && format('-DCMAKE_OSX_ARCHITECTURES={0}', matrix.osx_arch) || '' }} ${{ matrix.cross && '-DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/riscv64-linux-gnu.cmake' || '' }}

      # Cap parallelism to 2: one cc1plus per core compiling wxWidgets + the large single-TU main.cpp
      # at -O2 all at once OOM-kills cc1plus on the hosted runners (esp. the 7 GB macOS M1). Two at a
      # time fits, at the cost of a slower (but reliable) build.
      - name: Build wxnote
        run: cmake --build build --config Release --target wxnote --parallel 2

      - name: Package AppImage (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: bash installer/linux/build-appimage.sh

      - name: Package .deb (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: bash installer/linux/build-deb.sh

      - name: Package .rpm (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: bash installer/linux/build-rpm.sh

      - name: Package .flatpak (Linux)
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        run: bash installer/linux/build-flatpak.sh

      - name: Upload Linux packages
        if: startsWith(matrix.name, 'linux') && !matrix.cross
        uses: actions/upload-artifact@v7
        with:
          name: wxnote-${{ matrix.name }}-packages
          path: build/installer/*

      # riscv64: only the .deb is feasible cross (dpkg-deb just packs the already-cross-built ELF).
      # AppImage/flatpak have no riscv64 runtime and can't cross on x86_64; rpm is deferred. The staged
      # build/bin/wxnote is a riscv64 ELF from the cross toolchain; DEB_ARCH_OVERRIDE stamps the control
      # file's Architecture: and the package name.
      - name: Package .deb (Linux cross riscv64)
        if: matrix.cross == 'riscv64'
        env:
          DEB_ARCH_OVERRIDE: riscv64
        run: bash installer/linux/build-deb.sh

      - name: Upload Linux riscv64 packages
        if: matrix.cross == 'riscv64'
        uses: actions/upload-artifact@v7
        with:
          name: wxnote-linux-riscv64-packages
          path: build/installer/*

      # macOS code signing (release builds only, and only when the Apple secrets exist - otherwise every
      # step below no-ops and the .dmg ships unsigned, exactly as before). Signing needs the caller to
      # pass secrets down, which release.yml does via `secrets: inherit`. `github.ref_type == 'tag'`
      # keeps notarization (a slow round-trip to Apple) off regular push/PR builds. See docs/SIGNING.md.
      # NOTE: this path is scaffolded but has NOT been exercised against a real Developer ID cert yet.
      - name: Set up macOS code signing
        if: startsWith(matrix.name, 'macos') && github.ref_type == 'tag'
        env:
          CERT_B64:  ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASS: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CERT_B64:-}" ]; then
            echo "::notice::APPLE_CERT_BASE64 not set - the .dmg ships UNSIGNED/UN-NOTARIZED (Gatekeeper blocks first launch). See docs/SIGNING.md."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/wxnote-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASS" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN" >/dev/null
          # Add our keychain to the search list (keeping the existing ones) so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["]//g')
          IDENT=$(security find-identity -v -p codesigning "$KEYCHAIN" | grep 'Developer ID Application' | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENT" ]; then echo "::error::no 'Developer ID Application' identity in the imported cert"; exit 1; fi
          echo "MACOS_SIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"   # build-dmg.sh reads this to codesign the .app
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Package .dmg (macOS)
        if: startsWith(matrix.name, 'macos')
        run: bash installer/macos/build-dmg.sh ${{ matrix.osx_arch }}

      # Notarize the (now app-signed) .dmg and staple the ticket, so Gatekeeper clears it offline.
      - name: Notarize + staple .dmg (macOS)
        if: startsWith(matrix.name, 'macos') && github.ref_type == 'tag'
        env:
          APPLE_ID:      ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PWD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID:-}" ]; then
            echo "::notice::APPLE_ID not set - skipping notarization. See docs/SIGNING.md."
            exit 0
          fi
          DMG=$(ls build/installer/*.dmg | head -1)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PWD" --wait
          xcrun stapler staple "$DMG"
          echo "Notarized + stapled $DMG"

      - name: Upload macOS package
        if: startsWith(matrix.name, 'macos')
        uses: actions/upload-artifact@v7
        with:
          name: wxnote-${{ matrix.name }}-package
          path: build/installer/*

      # windows-latest does NOT ship makensis preinstalled (confirmed by an actual CI failure - an
      # earlier version of this step assumed it did) - install via Chocolatey (guaranteed present on
      # every hosted Windows runner) and explicitly add its install directory to $GITHUB_PATH, since
      # a Chocolatey install updates the machine PATH but each workflow step is a fresh process that
      # only sees $GITHUB_PATH's accumulated entries, not a live-refreshed system PATH.
      - name: Ensure NSIS (Windows)
        if: startsWith(matrix.name, 'windows')
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
          }
          $nsisDir = @("${env:ProgramFiles(x86)}\NSIS", "$env:ProgramFiles\NSIS") | Where-Object { Test-Path "$_\makensis.exe" } | Select-Object -First 1
          if ($nsisDir) { Add-Content -Path $env:GITHUB_PATH -Value $nsisDir }
          else { throw "makensis.exe not found after installing NSIS" }

      # NSIS's OutFile doesn't create its output directory, so make it first.
      - name: Package installer (Windows)
        if: startsWith(matrix.name, 'windows')
        shell: cmd
        run: |
          if not exist build\installer mkdir build\installer
          makensis ${{ matrix.nsis_flags }} installer\windows\wxnote.nsi

      - name: Upload Windows installer
        if: startsWith(matrix.name, 'windows')
        uses: actions/upload-artifact@v7
        with:
          name: wxnote-${{ matrix.name }}-installer
          path: build/installer/*
