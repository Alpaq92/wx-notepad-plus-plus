name: build

# Builds wxNotepad++ on all three target platforms. wxWidgets is fetched + built from source
# (FetchContent), so the only system dependency is GTK3 on Linux; macOS/Windows need just the
# toolchain. Verifies the cross-platform claim - the parts the Windows dev machine can't check.

# Note: each job builds wxWidgets from source (cached after the first green run), so the matrix is heavy.
# The repo is public, so GitHub-hosted runners are free; macOS just queues longer than linux/windows.
on:
  push:
    branches: [ wx-migration, master ]
    paths: [ 'src/**', 'include/**', 'third_party/**', 'resources/**', 'installer/**', 'CMakeLists.txt', '.github/workflows/build.yml' ]
  pull_request:
    paths: [ 'src/**', 'include/**', 'third_party/**', 'installer/**', 'CMakeLists.txt', '.github/workflows/build.yml' ]
  workflow_dispatch:
  workflow_call:   # release.yml calls this on a version tag push, then publishes the 3 packaging artifacts

# A newer push to a branch cancels that branch's still-queued/running build, so the matrix doesn't
# pile up (each macOS run counts 10x against private-repo Actions minutes). Only the latest commit
# on a branch is verified, which is what we want.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  name: linux }
          - { os: macos-latest,   name: macos }
          - { os: windows-latest, name: windows }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install GTK3 (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build pkg-config libgtk-3-dev

      # rpm: provides rpmbuild for build-rpm.sh. flatpak/flatpak-builder: for build-flatpak.sh.
      # elfutils: provides eu-strip, which flatpak-builder always shells out to for its automatic
      # debuginfo-extraction step (no manifest option was found to skip this step on this
      # flatpak-builder version - it doesn't recognize no-debuginfo at either the manifest or
      # module level), even though we stage an already-built Release binary with nothing to split.
      - name: Install packaging tools (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get install -y --no-install-recommends rpm flatpak flatpak-builder elfutils
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo

      # Ubuntu 24.04+ restricts unprivileged user namespaces by default (AppArmor), which breaks
      # flatpak-builder's bubblewrap sandbox with an otherwise-cryptic setup failure. This is the
      # standard CI workaround; harmless no-op on runner images where the sysctl key doesn't exist
      # or the restriction isn't in effect.
      - name: Allow unprivileged user namespaces for flatpak-builder (Linux)
        if: matrix.name == 'linux'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      # The GNOME runtime + SDK are a multi-hundred-MB download - cache them so only the first run
      # (or a version bump) pays that cost. Keyed on the pinned version in the Flatpak manifest.
      - name: Cache Flatpak runtime (Linux)
        if: matrix.name == 'linux'
        uses: actions/cache@v6
        with:
          path: ~/.local/share/flatpak
          key: flatpak-gnome46-v1

      - name: Install Flatpak runtime (Linux)
        if: matrix.name == 'linux'
        run: flatpak install -y --user flathub org.gnome.Platform//46 org.gnome.Sdk//46

      # Cache the fetched + built wxWidgets so iterations don't rebuild it from source each run.
      # "v2" (was unversioned): the cached build/_deps holds a CMakeCache.txt stamped with whichever
      # generator configured it - bumping the key forces a clean rebuild under the now-forced Ninja
      # generator below instead of erroring with "generator does not match the one used previously".
      - name: Cache wxWidgets
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: wx331-v2-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: wx331-v2-${{ matrix.name }}-

      # msvc-dev-cmd: puts cl.exe (not the runner's incidental MinGW g++) first on PATH, which
      # plain Ninja needs since - unlike the Visual Studio generator - it has no built-in MSVC
      # discovery of its own.
      - name: Set up MSVC (Windows)
        if: matrix.name == 'windows'
        uses: ilammy/msvc-dev-cmd@v1

      # -G Ninja: without it, Windows' default generator is the multi-config "Visual Studio" one,
      # which ignores RUNTIME_OUTPUT_DIRECTORY's plain (non-per-config) setting and puts the exe in
      # build/bin/Release/ instead of build/bin/ - breaking every packaging script below that reads
      # from build/bin/wxnpp.exe directly. Ninja is single-config and preinstalled on all 3 hosted
      # runner images; this also matches the build command documented at the top of CMakeLists.txt.
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # Cap parallelism to 2: one cc1plus per core compiling wxWidgets + the large single-TU main.cpp
      # at -O2 all at once OOM-kills cc1plus on the hosted runners (esp. the 7 GB macOS M1). Two at a
      # time fits, at the cost of a slower (but reliable) build.
      - name: Build wxnpp
        run: cmake --build build --config Release --target wxnpp --parallel 2

      - name: Package AppImage (Linux)
        if: matrix.name == 'linux'
        run: bash installer/linux/build-appimage.sh

      - name: Package .deb (Linux)
        if: matrix.name == 'linux'
        run: bash installer/linux/build-deb.sh

      - name: Package .rpm (Linux)
        if: matrix.name == 'linux'
        run: bash installer/linux/build-rpm.sh

      - name: Package .flatpak (Linux)
        if: matrix.name == 'linux'
        run: bash installer/linux/build-flatpak.sh

      - name: Upload Linux packages
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: wxnpp-linux-packages
          path: build/installer/*

      - name: Package .dmg (macOS)
        if: matrix.name == 'macos'
        run: bash installer/macos/build-dmg.sh

      - name: Upload macOS package
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: wxnpp-macos-package
          path: build/installer/*

      # windows-latest does NOT ship makensis preinstalled (confirmed by an actual CI failure - an
      # earlier version of this step assumed it did) - install via Chocolatey (guaranteed present on
      # every hosted Windows runner) and explicitly add its install directory to $GITHUB_PATH, since
      # a Chocolatey install updates the machine PATH but each workflow step is a fresh process that
      # only sees $GITHUB_PATH's accumulated entries, not a live-refreshed system PATH.
      - name: Ensure NSIS (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y --no-progress
          }
          $nsisDir = @("${env:ProgramFiles(x86)}\NSIS", "$env:ProgramFiles\NSIS") | Where-Object { Test-Path "$_\makensis.exe" } | Select-Object -First 1
          if ($nsisDir) { Add-Content -Path $env:GITHUB_PATH -Value $nsisDir }
          else { throw "makensis.exe not found after installing NSIS" }

      # NSIS's OutFile doesn't create its output directory, so make it first.
      - name: Package installer (Windows)
        if: matrix.name == 'windows'
        shell: cmd
        run: |
          if not exist build\installer mkdir build\installer
          makensis installer\windows\wxnpp.nsi

      - name: Upload Windows installer
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: wxnpp-windows-installer
          path: build/installer/*
